<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COC/POE 우주 봉지재 시뮬레이터</title>

<style>
body{
  margin:0;
  background:#03050f;
  color:#dde6f5;
  font-family:Arial,sans-serif;
  overflow:hidden;
}

header{
  height:60px;
  background:#080d1e;
  border-bottom:1px solid #1a2a4a;
  display:flex;
  align-items:center;
  padding:0 20px;
}

header h1{
  margin:0;
  font-size:18px;
}

.wrap{
  display:grid;
  grid-template-columns:320px 1fr;
  height:calc(100vh - 60px);
}

.side{
  background:#080d1e;
  border-right:1px solid #1a2a4a;
  padding:18px;
  overflow:auto;
}

.main{
  position:relative;
  background:#020617;
}

label{
  display:block;
  margin-top:16px;
  font-size:13px;
  color:#9fb3d1;
}

input,select{
  width:100%;
  margin-top:6px;
}

button{
  width:100%;
  padding:13px;
  margin-top:22px;
  border:0;
  border-radius:8px;
  background:#2563eb;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}

button:disabled{
  background:#334155;
  cursor:not-allowed;
}

.preset-row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:6px;
  margin-top:6px;
}

.preset-btn{
  padding:8px 4px;
  margin:0;
  border:1px solid #1a2a4a;
  border-radius:6px;
  background:#0d1530;
  color:#dde6f5;
  font-size:11px;
  font-weight:700;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2px;
  transition:transform .08s, background .12s;
}

.preset-btn span{
  font-size:9px;
  font-weight:normal;
  color:#9fb3d1;
}

.preset-btn:hover{ transform:translateY(-1px); }
.preset-danger:hover{  background:#3a1010; border-color:#ff4444; }
.preset-coc:hover{     background:#3a2410; border-color:#ffb300; }
.preset-optimal:hover{ background:#103a1c; border-color:#00e676; }

.card{
  background:#0d1530;
  border:1px solid #1a2a4a;
  border-radius:8px;
  padding:12px;
  margin-top:10px;
}

.card b{
  display:block;
  margin-bottom:6px;
  color:#00d4ff;
  font-size:13px;
}

.value{
  font-size:20px;
  font-weight:bold;
}

.good{color:#00e676}
.warn{color:#ffb300}
.bad{color:#ff4444}

.warning{
  margin-top:8px;
  padding:8px;
  border-radius:6px;
  background:#3a1010;
  border:1px solid #ff4444;
  color:#ff8888;
  font-size:12px;
  display:none;
}

canvas{
  width:100%;
  height:100%;
  display:block;
}

.hud{
  position:absolute;
  top:18px;
  right:18px;
  width:260px;
  background:rgba(8,13,30,.92);
  border:1px solid #1a2a4a;
  border-radius:10px;
  padding:14px;
}

.hud h2{
  margin:0 0 10px;
  color:#00d4ff;
  font-size:14px;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  border-bottom:1px solid #1a2a4a;
  font-size:13px;
}

.phase{
  position:absolute;
  left:18px;
  top:18px;
  background:rgba(8,13,30,.92);
  border:1px solid #1a2a4a;
  border-radius:10px;
  padding:14px;
  width:250px;
}

.phase b{
  color:#00d4ff;
}

.msg{
  position:absolute;
  bottom:28px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(8,13,30,.92);
  border:1px solid #1a2a4a;
  border-radius:10px;
  padding:12px 22px;
  font-weight:bold;
}

.hint{
  color:#6c8aba;
  font-size:11px;
  font-weight:normal;
  margin-left:4px;
}

/* ── 슬라이더 직관 시각화 ── */
.nb-viz{
  position:relative;
  margin:8px 0 4px;
}

.nb-bar{
  height:10px;
  background:linear-gradient(to right,#4caf50 0%,#ffb300 50%,#ef5350 100%);
  border-radius:5px;
}

.nb-marker{
  position:absolute;
  top:-2px;
  width:6px;
  height:14px;
  background:#fff;
  border-radius:3px;
  box-shadow:0 0 4px rgba(0,0,0,.7);
  transform:translateX(-50%);
  transition:left .15s;
  pointer-events:none;
}

.nb-info{
  display:flex;
  justify-content:space-between;
  font-size:10px;
  color:#9fb3d1;
  margin-top:3px;
}

.th-viz{
  height:44px;
  margin:8px 0 4px;
  background:#03050f;
  border:1px solid #1a2a4a;
  border-radius:4px;
  display:flex;
  align-items:flex-end;
  padding:2px;
}

.th-film{
  width:100%;
  background:linear-gradient(to bottom,#00d4ff,#2563eb);
  border-radius:2px;
  transition:height .15s;
}

.ratio-viz{
  display:flex;
  flex-direction:column;
  height:56px;
  border-radius:4px;
  overflow:hidden;
  border:1px solid #1a2a4a;
  margin:8px 0 4px;
}

.ratio-viz .layer{
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  font-weight:700;
  color:#03050f;
  min-height:0;
  transition:flex-grow .15s;
}

.poe-layer{background:linear-gradient(to bottom,#66bb6a,#2e7d32);}
.coc-layer{background:linear-gradient(to bottom,#42a5f5,#1565c0);}

@media(max-width:900px){

  .wrap{
    grid-template-columns:1fr;
    grid-template-rows:auto 1fr;
  }

  .side{
    height:520px;
  }

}
</style>
</head>

<body>

<header>
  <h1>COC/POE 우주 태양전지 봉지재 수명 예측 시뮬레이터</h1>
</header>

<div class="wrap">

  <div class="side">

    <label>미션 종류</label>
    <select id="mission">
      <option value="LEO">LEO 저궤도</option>
      <option value="SSO">SSO 태양동기궤도</option>
      <option value="GEO">GEO 정지궤도</option>
      <option value="LUNAR">달 궤도</option>
    </select>

    <label>노보넨 함량: <span id="nbv">40</span> mol% <span class="hint" id="nbTgHint">(Tg ≈ 165℃)</span></label>
    <input id="nb" type="range" min="20" max="55" value="40">
    <div class="nb-viz">
      <div class="nb-bar"></div>
      <div class="nb-marker" id="nbMarker"></div>
      <div class="nb-info"><span>유연</span><span>강성</span></div>
    </div>

    <label>총 두께: <span id="thv">400</span> μm</label>
    <input id="th" type="range" min="100" max="1000" value="400">
    <div class="th-viz">
      <div class="th-film" id="thFilm"></div>
    </div>

    <label>POE / COC 비율: POE <span id="poev">50</span>% / COC <span id="cocv">50</span>%</label>
    <input id="poe" type="range" min="20" max="80" value="50">
    <div class="ratio-viz">
      <div class="layer poe-layer" id="poeLayer">POE 50%</div>
      <div class="layer coc-layer" id="cocLayer">COC 50%</div>
    </div>

    <label style="margin-top:18px">발표용 프리셋</label>
    <div class="preset-row">
      <button class="preset-btn preset-danger"  data-nb="20" data-th="400" data-poe="50">⚠ Danger<span>0년 Tg</span></button>
      <button class="preset-btn preset-coc"     data-nb="40" data-th="400" data-poe="20">⚙ COC-Heavy<span>~4년 피로</span></button>
      <button class="preset-btn preset-optimal" data-nb="40" data-th="600" data-poe="54">★ Optimal<span>~12년 광학</span></button>
    </div>

    <button id="runBtn">🚀 시뮬레이션 시작</button>

    <div class="card">
      <b>광투과율</b>
      <div id="transparencyResult" class="value">-</div>
    </div>

    <div class="card">
      <b>출력 유지율</b>
      <div id="powerResult" class="value">-</div>
    </div>

    <div class="card">
      <b>희생층 잔여 두께</b>
      <div id="sacrificialResult" class="value">-</div>
    </div>

    <div class="card">
      <b>기능 유지층 상태</b>
      <div id="coreResult" class="value">-</div>
    </div>

    <div class="card">
      <b>예상 수명</b>
      <div id="lifeResult" class="value">-</div>
    </div>

    <div class="card">
      <b>고장 원인</b>
      <div id="failResult" style="font-size:13px;line-height:1.7">-</div>
    </div>

  </div>

  <div class="main">

    <canvas id="canvas"></canvas>

    <div class="phase">
      <b>현재 단계</b>
      <div id="phaseText">대기 중</div>
    </div>

    <div class="hud">

      <h2>실시간 봉지재 상태</h2>

      <div class="row">
        <span>열 안정성</span>
        <span id="hudTemp">대기</span>
      </div>

      <div class="row">
        <span>방사선 황변</span>
        <span id="hudRad">대기</span>
      </div>

      <div class="row">
        <span>AO 침식</span>
        <span id="hudAO">대기</span>
      </div>

      <div class="row">
        <span>핵심 기능층</span>
        <span id="hudCore">대기</span>
      </div>

      <div class="row">
        <span>층간 박리</span>
        <span id="hudDelam">대기</span>
      </div>

    </div>

    <div class="msg" id="msg">
      시뮬레이션 준비 완료
    </div>

  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", ()=>{

/* =========================================================
   ELEMENTS
========================================================= */
const mission = document.getElementById("mission");
const nb = document.getElementById("nb");
const th = document.getElementById("th");
const poe = document.getElementById("poe");

const nbv = document.getElementById("nbv");
const thv = document.getElementById("thv");
const poev = document.getElementById("poev");
const cocv = document.getElementById("cocv");

const nbTgHint = document.getElementById("nbTgHint");
const nbMarker = document.getElementById("nbMarker");
const thFilm = document.getElementById("thFilm");
const poeLayer = document.getElementById("poeLayer");
const cocLayer = document.getElementById("cocLayer");

const runBtn = document.getElementById("runBtn");

const transparencyResult = document.getElementById("transparencyResult");
const powerResult = document.getElementById("powerResult");
const sacrificialResult = document.getElementById("sacrificialResult");
const coreResult = document.getElementById("coreResult");
const lifeResult = document.getElementById("lifeResult");
const failResult = document.getElementById("failResult");

const phaseText = document.getElementById("phaseText");

const hudTemp = document.getElementById("hudTemp");
const hudRad = document.getElementById("hudRad");
const hudAO = document.getElementById("hudAO");
const hudCore = document.getElementById("hudCore");
const hudDelam = document.getElementById("hudDelam");

const msg = document.getElementById("msg");

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

/* =========================================================
   CONSTANTS — Team Monomers 최종 식 (LEO 고정)
   ※ NB(mol%), TH(μm), rPOE(%) 3개 슬라이더, Tsim = 15년 고정
========================================================= */

const SIM_HORIZON = 15; // years

// 환경 상수 (LEO: ISS 400km, 경사각 51.6°)
const ENV = {
  LEO: {
    RAD_RATE: 0.5,       // kGy/year — 방사선 dose rate (MDPI Electronics 12(19) 4058)
    UV_RATE:  5256,      // ESH/year — 일조비 60% × 8760h (NREL Solar Spectra)
    AO_RATE:  3.28e21,   // atoms/cm²/year (NASA NTRS 20070002707)
    T_MAX:    150,       // ℃ 태양 직사 최고온
    T_MIN:    -150,      // ℃ 지구 그늘 최저온
    DELTA_T:  300,       // ℃ 온도 변화폭 (PCBSync Satellite PCB)
    N_CYC:    5840       // cycles/year — 525,600분 ÷ 90분
  }
};

// 재료 / 모델 파라미터
const MAT = {
  // 광학
  T0:       95,          // %       초기 광투과율
  ALPHA:    1e-4,        // /μm     Beer-Lambert 두께 감쇠
  K_RAD:    1e-4,        // /krad   방사선 황변 상수
  K_UV:     1e-6,        // /ESH    UV 황변 상수
  K_ROUGH:  1e-3,        // /μm     AO 거칠기 → 광산란
  K_CONT:   1.0,         // 무차원  CVCM 오염물 광손실
  // ksyn 제거 (검증 데이터 없음)

  // Tg 회귀 (NB → Tg)
  TG0:      -15,         // ℃       NB=0 절편 (ScienceDirect S0376738805006071)
  MG:       4.5,         // ℃/mol%  기울기 (TOPAS datasheet)

  // 기계 (혼합 법칙)
  E_COC:    3000,        // MPa     COC 단독 영률
  E_POE:    10,          // MPa     POE 단독 영률
  K_XL:     1e-4,        // /krad   방사선 가교 상수
  CTE_COC:  60,          // ppm/℃  (TOPAS)
  CTE_POE:  180,         // ppm/℃  (Wiley pip.3323)
  SIGMA_ADH:5,           // MPa     박리 임계 전단응력 (peel 30 N/cm ÷ 0.6mm = 5 MPa)
  ETA:      0.05,        // 무차원  구속 완화 인자 (σ_full × η = σ_eff). 다층 구속·완화·표면 농도 묶음.

  // AO / 피로
  EY:       3.5e-24,     // cm³/atom AO 침식 수율 (NASA NTRS 20090034484)
  CHI:      0.2,         // 무차원   차폐 인자
  MU_CORE:  1.8,         // 무차원   POE 소진 후 COC 침식 가속
  N_REF:    2e4,         // cycles   Coffin-Manson 기준
  N_EXP:    2,           // 무차원   응력비 지수 (Wiley Polym. Eng. Sci. 1969)

  // Outgassing (조성 의존)
  TML_POE:  1.5,         // %       POE 단독 포화 TML
  TML_COC:  0.3,         // %       COC 단독 포화 TML
  CVCM_POE: 0.12,        // %       POE 단독 포화 CVCM
  CVCM_COC: 0.03,        // %       COC 단독 포화 CVCM
  TAU:      0.5,         // year    1차 시정수
  GAMMA_AO: 0.3,         // 무차원  LEO AO 응축물 제거율
  // ASTM E595: TML<1.0%, CVCM<0.1% (NASA GSFC)

  // 임계값 / 수치해석
  CRIT_T_RATIO: 0.60,    // T_opt < T0 × 0.60 → 광학 fail (우주용 보수 완화, IEC 0.80 → 0.60: LEO 10년+ 운용 허용)
  TML_LIMIT:    1.0,
  CVCM_LIMIT:   0.1,
  D_LIMIT:      1.0,
  lifetimeStep: 0.1      // year (사용자 spec 동일)
};

/* =========================================================
   INPUT
========================================================= */
function getInput(){
  const poeVal = +poe.value;
  return {
    mission: mission.value,
    nb: +nb.value,
    th: +th.value,
    sacrificialRatio: poeVal,        // POE = 외층/희생층 (AO 보호)
    coreRatio: 100 - poeVal,         // COC = 내층/기능 유지층
    dur: SIM_HORIZON
  };
}

function syncSliderLabels(){
  const nbVal = +nb.value;
  const thVal = +th.value;
  const poeVal = +poe.value;

  nbv.textContent = nbVal;
  thv.textContent = thVal;
  poev.textContent = poeVal;
  cocv.textContent = 100 - poeVal;

  // Tg 추정 (NB 회귀식)
  const tgEst = MAT.TG0 + nbVal * MAT.MG;
  nbTgHint.textContent = `(Tg ≈ ${tgEst.toFixed(0)}℃)`;

  // NB 마커 위치 (슬라이더 범위에 맞춤)
  const nbPct = (nbVal - 20) / (55 - 20) * 100;
  nbMarker.style.left = nbPct + "%";

  // 두께 시각화: 4~40px 단면 두께
  const thMin = 100, thMax = 1000;
  const filmHeight = 4 + (thVal - thMin) / (thMax - thMin) * 36;
  thFilm.style.height = filmHeight + "px";

  // POE/COC 적층 비율
  poeLayer.style.flexGrow = poeVal;
  cocLayer.style.flexGrow = 100 - poeVal;
  poeLayer.textContent = `POE ${poeVal}%`;
  cocLayer.textContent = `COC ${100 - poeVal}%`;
}

[nb, th, poe].forEach(el =>
  el.addEventListener("input", syncSliderLabels)
);
syncSliderLabels();

/* =========================================================
   SIMULATION CORE — Team Monomers 최종 식 (8 채널)
   simulateAt(S, t): 임의 시각 t년의 봉지재 상태 반환
========================================================= */
function simulateAt(S, t){
  const env = ENV.LEO;

  const NB    = S.nb;
  const TH    = S.th;
  const rPOE  = S.sacrificialRatio;
  const rCOC  = 100 - rPOE;
  const fPOE  = rPOE / 100;
  const fCOC  = rCOC / 100;
  const hPOE0 = TH * fPOE;     // μm 초기 POE 두께
  const hCOC0 = TH * fCOC;     // μm 초기 COC 두께

  // ── 채널 7: Tg 판정 (시간 무관, 즉시) ───────────────────
  // (a) 운용 범위 통과 조건 제거, (b)(c)만 유지
  const Tg = MAT.TG0 + MAT.MG * NB;
  const tgBrittle = (Tg - env.T_MIN) > 350;     // 저온 취성 (Tg > 200℃에서만)
  const tgSoften  = (env.T_MAX - Tg) > 0;       // 고온 연화 (Tg < T_MAX → 운용 중 고무화)

  // ── 채널 1: AO 침식 (COC 희생/외층 → POE 코어 가속 침식) ──
  // FAO(t)     = Φ̇AO × t
  // Δhgross(t) = Ey × FAO × 10⁴ × χ
  const FAO      = env.AO_RATE * t;
  const dh_gross = MAT.EY * FAO * 1e4 * MAT.CHI;   // μm

  let tPOE, tCOC;
  if (dh_gross <= hCOC0){
    tCOC = hCOC0 - dh_gross;
    tPOE = hPOE0;
  } else {
    tCOC = 0;
    tPOE = Math.max(0, hPOE0 - (dh_gross - hCOC0) * MAT.MU_CORE);
  }
  const aoFail = tCOC <= 0;

  // ── 채널 2: AO → 표면 거칠기 → 광산란 ───────────────────
  const dh_tot = (hPOE0 - tPOE) + (hCOC0 - tCOC);
  const Lrough = MAT.K_ROUGH * dh_tot;

  // ── 채널 8: Outgassing (조성 의존 포화) ─────────────────
  // TMLsat = TML_POE·fPOE + TML_COC·fCOC
  // TML(t) = TMLsat × (1 − exp(−t/τ))
  // CVCMeff = CVCMsat × (1 − exp(−t/τ)) × (1 − γAO)
  const TML_sat  = MAT.TML_POE  * fPOE + MAT.TML_COC  * fCOC;
  const CVCM_sat = MAT.CVCM_POE * fPOE + MAT.CVCM_COC * fCOC;
  const outFrac  = 1 - Math.exp(-t / MAT.TAU);
  const TML_t    = TML_sat  * outFrac;
  const CVCM_eff = CVCM_sat * outFrac * (1 - MAT.GAMMA_AO);
  const tmlFail  = TML_t   >= MAT.TML_LIMIT;
  const cvcmFail = CVCM_eff >= MAT.CVCM_LIMIT;

  // ── 채널 3: 광학 열화 (다중 결합) ───────────────────────
  // T(t) = T₀ × exp(−α·TH) × exp(−kRad·Φ̇rad·t·100)  [kGy→krad]
  //            × exp(−kUV·Φ̇UV·t) × exp(−Lrough) × exp(−kCont·CVCMeff)
  const baselineOptical = MAT.T0 * Math.exp(-MAT.ALPHA * TH);
  const T_opt = MAT.T0
    * Math.exp(-MAT.ALPHA  * TH)
    * Math.exp(-MAT.K_RAD  * env.RAD_RATE * t * 100)
    * Math.exp(-MAT.K_UV   * env.UV_RATE  * t)
    * Math.exp(-Lrough)
    * Math.exp(-MAT.K_CONT * CVCM_eff);
  const opticalFail = T_opt < MAT.T0 * MAT.CRIT_T_RATIO;
  const powerRetention = baselineOptical > 0
    ? (T_opt / baselineOptical) * 100
    : 0;

  // ── 채널 4: 영률 (혼합 법칙) + 방사선 가교 ─────────────
  // Ebase = E_COC·fCOC + E_POE·fPOE
  // E(t)  = Ebase × (1 + kxl · Φ̇rad · t · 100)
  const E_base = MAT.E_COC * fCOC + MAT.E_POE * fPOE;
  const E_t    = E_base * (1 + MAT.K_XL * env.RAD_RATE * t * 100);

  // ── 채널 5: 열응력 (정적 박리) ─────────────────────────
  // Δα = |αPOE − αCOC|
  // σ_full(t) = E(t) × Δα·10⁻⁶ × ΔT
  // σ_eff(t)  = η × σ_full   (구속 완화)
  const dAlpha = Math.abs(MAT.CTE_POE - MAT.CTE_COC);
  const sigma  = MAT.ETA * E_t * (dAlpha * 1e-6) * env.DELTA_T;
  const stressFail = sigma > MAT.SIGMA_ADH;

  // ── 채널 6: 열사이클 피로 (Coffin-Manson + Miner) ──────
  // N(t) = Ncyc · t,  D(t) = (N/Nref) × (σ/σadh)^n
  const N_t = env.N_CYC * t;
  const D_t = (N_t / MAT.N_REF) * Math.pow(sigma / MAT.SIGMA_ADH, MAT.N_EXP);
  const fatigueFail = D_t >= MAT.D_LIMIT;

  // 실패 모드
  const failModes = [];
  if (tgBrittle)    failModes.push("Tg 저온 취성");
  if (tgSoften)     failModes.push("Tg 고온 연화");
  if (aoFail)       failModes.push("AO 침식 (COC 소진)");
  if (tmlFail)      failModes.push("Outgassing TML 초과");
  if (cvcmFail)     failModes.push("Outgassing CVCM 초과");
  if (opticalFail)  failModes.push("광학 열화 (투과율 80% 미달)");
  if (stressFail)   failModes.push("열응력 박리 (정적)");
  if (fatigueFail)  failModes.push("열사이클 피로 박리");

  return {
    t, Tg,
    radDose: env.RAD_RATE * t * 100,   // krad
    uvDose:  env.UV_RATE  * t,
    aoFluence: FAO,
    cycles:  N_t,
    sacrificial0: hPOE0, core0: hCOC0,
    sacrificialLayer: tPOE, coreLayer: tCOC,
    transparency: T_opt, baselineOptical, powerRetention,
    modulus: E_t, thermalStress: sigma, fatigueIndex: D_t,
    tmlNow: TML_t, cvcmNow: CVCM_eff,
    tgPassesRange: false,
    lowTBrittle:   tgBrittle,
    highTSoften:   tgSoften,
    failModes
  };
}

// 임계값 최초 도달 시각 = 수명 (사용자 spec: life = t − dt)
function findLifetime(S){
  const dt = MAT.lifetimeStep;
  // 채널 7 (Tg) 즉시 판정 — (b) 저온 취성, (c) 고온 연화
  const Tg = MAT.TG0 + MAT.MG * S.nb;
  if ((Tg - ENV.LEO.T_MIN) > 350) return 0;
  if ((ENV.LEO.T_MAX - Tg) > 0)   return 0;

  for (let t = dt; t <= S.dur + dt/2; t += dt){
    if (simulateAt(S, t).failModes.length > 0){
      return +Math.max(0, t - dt).toFixed(1);
    }
  }
  return S.dur;
}

/* =========================================================
   UI UPDATE
========================================================= */
function tone(ok){ return ok ? "good" : "bad"; }

function updateHUD(state){
  const tgOK = !state.highTSoften;
  hudTemp.className = tone(tgOK);
  hudTemp.textContent = tgOK ? "안정" : "고온 연화";

  const radOK = state.transparency >= MAT.T0 * MAT.CRIT_T_RATIO;
  hudRad.className = tone(radOK);
  hudRad.textContent = radOK ? "양호" : "황변";

  const aoOK = state.sacrificialLayer > 0;
  hudAO.className = tone(aoOK);
  hudAO.textContent = aoOK ? "보호중" : "소진";

  const coreOK = state.coreLayer > 0;
  hudCore.className = tone(coreOK);
  hudCore.textContent = coreOK ? "유지" : "손상";

  const delamOK =
    state.thermalStress <= MAT.SIGMA_ADH &&
    state.fatigueIndex   < MAT.D_LIMIT;
  hudDelam.className = tone(delamOK);
  hudDelam.textContent = delamOK ? "안정" : "박리 위험";
}

function updateSidebar(finalState, lifetime){
  transparencyResult.textContent = finalState.transparency.toFixed(1) + " %";
  powerResult.textContent        = finalState.powerRetention.toFixed(1) + " %";
  sacrificialResult.textContent  = finalState.sacrificialLayer.toFixed(1) + " μm";
  coreResult.textContent         = finalState.coreLayer.toFixed(1) + " μm";
  lifeResult.textContent         = lifetime + " 년";
  failResult.innerHTML = finalState.failModes.length
    ? finalState.failModes.map(x => "• " + x).join("<br>")
    : "통과";
}

/* =========================================================
   ANIMATION LOOP
   ─ 발사 단계 (0~0.2): 로켓 애니
   ─ 운용 단계 (0.2~1.0): t년차 → simulateAt(t) → HUD 갱신
========================================================= */
let W, H;
let stars = [];
let running = false;
let progress = 0;
let currentSession = null; // {S, finalState, lifetime}

function resize(){
  W = canvas.width  = canvas.clientWidth;
  H = canvas.height = canvas.clientHeight;
  stars = [];
  for (let i = 0; i < 220; i++){
    stars.push({
      x: Math.random()*W,
      y: Math.random()*H,
      r: Math.random()*1.5,
      op: Math.random()
    });
  }
}
window.addEventListener("resize", resize);
resize();

function startSimulation(){
  const S = getInput();
  // S.dur = SIM_HORIZON 으로 들어와서 findLifetime 탐색 상한이 됨
  const lifetime = findLifetime(S);

  // 운용 가능 기간 = 첫 실패 시각 (수명). 이 구간만 애니메이션.
  const simDur = Math.max(0.1, lifetime);
  S.dur = simDur;
  const finalState = simulateAt(S, simDur);

  currentSession = { S, finalState, lifetime };
  updateSidebar(finalState, lifetime);

  // 즉시 실패 (Tg 운용범위 통과 등)
  if (lifetime === 0){
    msg.textContent = "⚠ 현재 조건은 즉시 실패 — 운용 불가능";
    phaseText.textContent = "운용 불가능 (t = 0)";
    updateHUD(finalState);
    running = false;
    progress = 1;
    draw();
    return;
  }

  msg.textContent = `시뮬레이션 실행 중 (운용 가능 기간 ${lifetime.toFixed(1)}년)`;
  running = true;
  progress = 0;
  requestAnimationFrame(loop);
}

runBtn.addEventListener("click", startSimulation);

document.querySelectorAll(".preset-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    nb.value  = btn.dataset.nb;
    th.value  = btn.dataset.th;
    poe.value = btn.dataset.poe;
    syncSliderLabels();
    startSimulation();
  });
});

function loop(){
  progress = Math.min(1, progress + 0.003);
  draw();

  if (currentSession && progress >= 0.2){
    const p = (progress - 0.2) / 0.8;
    const t = p * currentSession.S.dur;
    const state = simulateAt(currentSession.S, t);
    updateHUD(state);
    phaseText.textContent =
      `궤도 운용 / ${t.toFixed(2)}년차 (rad ${state.radDose.toFixed(1)} krad)`;
  } else {
    phaseText.textContent = "발사 및 상승";
  }

  if (running && progress < 1){
    requestAnimationFrame(loop);
  } else if (progress >= 1){
    running = false;
    const lt = currentSession.lifetime;
    if (lt >= SIM_HORIZON){
      msg.textContent = `✓ 장기 운용 검증 완료 — ${SIM_HORIZON}년 이내 실패 모드 없음`;
      phaseText.textContent = `${SIM_HORIZON}년차 (한계 미도달)`;
    } else {
      msg.textContent = `수명 한계 도달 — ${lt.toFixed(1)}년`;
      phaseText.textContent = `${lt.toFixed(2)}년차 (한계 도달)`;
    }
  }
}

/* =========================================================
   DRAWING  (디자인은 추후 디렉팅 — 최소 구현만)
========================================================= */
function draw(){
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = "#020617";
  ctx.fillRect(0, 0, W, H);

  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${s.op})`;
    ctx.fill();
  });

  if (progress < 0.2){
    drawRocket(progress / 0.2);
  } else {
    drawOrbit((progress - 0.2) / 0.8);
  }
}

function drawRocket(q){
  const x = W/2;
  const y = H*0.8 - q*H*0.9;

  ctx.save();
  ctx.translate(x, y);

  ctx.fillStyle = "#dbeafe";
  ctx.fillRect(-14, -70, 28, 90);

  ctx.beginPath();
  ctx.moveTo(-14, -70);
  ctx.lineTo(0, -105);
  ctx.lineTo(14, -70);
  ctx.fill();

  ctx.fillStyle = "#1d4ed8";
  ctx.fillRect(-38, -25, 24, 12);
  ctx.fillRect(14, -25, 24, 12);

  const flame = ctx.createLinearGradient(0, 20, 0, 100);
  flame.addColorStop(0, "rgba(255,200,80,0.9)");
  flame.addColorStop(1, "rgba(255,80,0,0)");
  ctx.fillStyle = flame;
  ctx.beginPath();
  ctx.moveTo(-10, 20);
  ctx.lineTo(10, 20);
  ctx.lineTo(0, 90);
  ctx.fill();

  ctx.restore();
}

function drawOrbit(p){
  const cx = W/2, cy = H/2;
  const earthR = Math.min(W, H) * 0.12;

  ctx.beginPath();
  ctx.arc(cx, cy, earthR, 0, Math.PI*2);
  ctx.fillStyle = "#1e40af";
  ctx.fill();

  const orbitR = earthR * 2.2;
  ctx.beginPath();
  ctx.arc(cx, cy, orbitR, 0, Math.PI*2);
  ctx.strokeStyle = "rgba(0,212,255,0.3)";
  ctx.lineWidth = 1;
  ctx.stroke();

  const angle = p * Math.PI * 8;
  const sx = cx + orbitR * Math.cos(angle);
  const sy = cy + orbitR * Math.sin(angle);
  ctx.beginPath();
  ctx.arc(sx, sy, 5, 0, Math.PI*2);
  ctx.fillStyle = "#00d4ff";
  ctx.fill();
}

});
</script>
</body>
